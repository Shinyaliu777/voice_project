services:
  postgres:
    image: postgres:16-alpine
    container_name: voice_postgres
    environment:
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice
      POSTGRES_DB: voice_project
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice -d voice_project"]
      interval: 5s
      timeout: 5s
      retries: 10
